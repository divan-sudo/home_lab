services:
  pihole:
    image: pihole/pihole:2026.02.0
    container_name: pihole
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      WEBPASSWORD: "pihole"
      FTLCONF_LOCAL_IPV4: "${SERVER_IP}"
      DNSMASQ_LISTENING: "all"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80/tcp"
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
